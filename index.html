<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelRun — Easy Game</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
    --accent: #00ff88; --accent2: #ff3366; --accent3: #3399ff;
    --text: #e0e0f0; --muted: #555570;
    --pixel: 'Press Start 2P', monospace; --body: 'Outfit', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.015) 2px, rgba(0,255,136,0.015) 4px);
    pointer-events: none; z-index: 9999;
  }
  .screen { display: none; }
  .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
  #loginScreen { background: radial-gradient(ellipse at 50% 0%, #0d2a1a 0%, var(--bg) 70%); }
  .login-card {
    background: var(--surface); border: 1px solid var(--border); border-top: 3px solid var(--accent);
    border-radius: 2px; padding: 48px 40px; max-width: 440px; width: 100%; text-align: center;
    box-shadow: 0 0 60px rgba(0,255,136,0.08), 0 20px 60px rgba(0,0,0,0.5); animation: fadeUp 0.6s ease both;
  }
  .game-logo { font-family: var(--pixel); font-size: 28px; color: var(--accent); letter-spacing: 2px; text-shadow: 0 0 20px rgba(0,255,136,0.5); margin-bottom: 8px; }
  .game-logo span { color: var(--accent2); }
  .pixel-char { font-size: 48px; margin-bottom: 24px; animation: bounce 1s infinite; display: block; }
  @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .google-btn {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%; padding: 14px 24px; background: transparent; border: 1px solid #333355;
    color: var(--text); font-family: var(--body); font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; border-radius: 2px; position: relative; overflow: hidden;
  }
  .google-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(0,255,136,0.06), transparent);
    transform: translateX(-100%); transition: transform 0.4s;
  }
  .google-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 20px rgba(0,255,136,0.1); }
  .google-btn:hover::before { transform: translateX(100%); }
  .google-icon { width: 20px; height: 20px; }
  #gameScreen { background: radial-gradient(ellipse at 50% 100%, #0a1a2a 0%, var(--bg) 70%); padding: 0; }
  .game-header {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; background: rgba(18,18,26,0.95); border-bottom: 1px solid var(--border);
    position: fixed; top: 0; z-index: 100; backdrop-filter: blur(10px);
  }
  .header-logo { font-family: var(--pixel); font-size: 12px; color: var(--accent); }
  .user-info { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--accent); }
  .header-btns { display: flex; gap: 8px; }
  .btn-small {
    padding: 6px 14px; background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-family: var(--body); font-size: 12px; cursor: pointer;
    border-radius: 2px; transition: all 0.2s;
  }
  .btn-small:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-small.admin { border-color: #ffaa00; color: #ffaa00; }
  .btn-small.admin:hover { background: rgba(255,170,0,0.1); }
  .game-area {
    margin-top: 57px; display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: calc(100vh - 57px); padding: 20px; gap: 20px;
  }
  .stats-bar { display: flex; gap: 24px; font-family: var(--pixel); font-size: 10px; }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .stat-label { color: var(--muted); font-size: 8px; }
  .stat-value { color: var(--accent); }
  .stat-value.hp { color: var(--accent2); }
  .stat-value.level { color: var(--accent3); }
  #gameCanvas { border: 2px solid var(--border); border-radius: 2px; box-shadow: 0 0 40px rgba(0,0,0,0.5); cursor: none; display: block; }
  .controls-hint { font-family: var(--pixel); font-size: 8px; color: var(--muted); text-align: center; line-height: 2; }
  .controls-hint span { color: var(--accent); }
  .save-toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--surface);
    border: 1px solid var(--accent); color: var(--accent); font-family: var(--pixel);
    font-size: 8px; padding: 10px 16px; border-radius: 2px; opacity: 0;
    transform: translateY(10px); transition: all 0.3s; pointer-events: none;
  }
  .save-toast.show { opacity: 1; transform: translateY(0); }
  #adminScreen { background: radial-gradient(ellipse at 50% 0%, #1a0a00 0%, var(--bg) 70%); align-items: stretch; padding: 0; }
  .admin-header { background: var(--surface); border-bottom: 2px solid #ffaa00; padding: 20px 32px; display: flex; align-items: center; gap: 16px; }
  .admin-title { font-family: var(--pixel); font-size: 14px; color: #ffaa00; }
  .admin-back { margin-left: auto; padding: 8px 20px; background: transparent; border: 1px solid #ffaa00; color: #ffaa00; font-family: var(--body); font-size: 13px; cursor: pointer; border-radius: 2px; transition: all 0.2s; }
  .admin-back:hover { background: rgba(255,170,0,0.1); }
  .admin-content { padding: 32px; flex: 1; overflow-y: auto; max-width: 1000px; margin: 0 auto; width: 100%; }
  .admin-stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .admin-stat-card { background: var(--surface); border: 1px solid var(--border); border-top: 2px solid #ffaa00; padding: 20px; border-radius: 2px; }
  .admin-stat-card .num { font-family: var(--pixel); font-size: 24px; color: #ffaa00; margin-bottom: 6px; }
  .admin-stat-card .lbl { color: var(--muted); font-size: 13px; }
  .users-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .users-table th { font-family: var(--pixel); font-size: 8px; color: #ffaa00; text-align: left; padding: 12px 16px; border-bottom: 1px solid #ffaa00; white-space: nowrap; }
  .users-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .users-table tr:hover td { background: rgba(255,170,0,0.03); }
  .user-row-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid #ffaa00; vertical-align: middle; margin-right: 8px; }
  .badge { display: inline-block; padding: 2px 8px; font-size: 10px; border-radius: 2px; font-weight: 600; }
  .badge-level { background: rgba(51,153,255,0.15); color: var(--accent3); border: 1px solid var(--accent3); }
  .loading-spinner { display: flex; align-items: center; gap: 12px; color: var(--muted); font-family: var(--pixel); font-size: 10px; padding: 32px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  /* Admin modal */
  .admin-modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    z-index: 9000; align-items: center; justify-content: center;
  }
  .admin-modal-overlay.open { display: flex; }
  .admin-modal-box {
    background: #12121a; border: 1px solid #ffaa00; border-top: 3px solid #ffaa00;
    padding: 36px 32px; max-width: 360px; width: 90%; border-radius: 2px;
    box-shadow: 0 0 40px rgba(255,170,0,0.15);
  }
  .admin-modal-title { font-family: var(--pixel); font-size: 10px; color: #ffaa00; margin-bottom: 24px; text-align: center; line-height: 1.8; }
  .admin-modal-label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 6px; }
  .admin-modal-input {
    width: 100%; padding: 10px 12px; background: #0a0a0f; border: 1px solid #333355;
    color: var(--text); font-family: var(--body); font-size: 14px; border-radius: 2px;
    outline: none; margin-bottom: 14px;
  }
  .admin-modal-input:focus { border-color: #ffaa00; }
  .admin-modal-btns { display: flex; gap: 10px; margin-top: 10px; }
  .admin-modal-submit { flex: 1; padding: 12px; background: transparent; border: 1px solid #ffaa00; color: #ffaa00; font-family: var(--body); font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 2px; }
  .admin-modal-cancel { padding: 12px 16px; background: transparent; border: 1px solid #333355; color: var(--muted); font-family: var(--body); font-size: 14px; cursor: pointer; border-radius: 2px; }
  .admin-modal-error { color: var(--accent2); font-size: 11px; margin-top: 12px; text-align: center; display: none; }
  @media (max-width: 600px) {
    .login-card { padding: 32px 24px; } .game-logo { font-size: 20px; }
    #gameCanvas { width: 340px !important; height: 250px !important; }
    .stats-bar { gap: 16px; } .admin-content { padding: 16px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="login-card">
    <span class="pixel-char">🕹️</span>
    <div class="game-logo">PIXEL<span>RUN</span></div>
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Gmail ile Giriş Yap
    </button>
    <p id="loginErrorMsg" style="margin-top:16px;font-size:12px;color:#ff3366;display:none;"></p>
  </div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div class="game-header">
    <div class="header-logo">PIXEL<span style="color:var(--accent2)">RUN</span></div>
    <div class="user-info">
      <img id="headerAvatar" class="user-avatar" src="" alt="">
      <span id="headerName" style="font-size:13px;"></span>
    </div>
    <div class="header-btns">
      <button id="adminDirectBtn" class="btn-small admin" onclick="openAdminDirect()" style="display:none;">👑 Admin</button>
      <button class="btn-small" onclick="doSignOut()">Çıkış</button>
    </div>
  </div>
  <div class="game-area">
    <div class="stats-bar">
      <div class="stat"><div class="stat-label">PUAN</div><div class="stat-value" id="scoreDisplay">0</div></div>
      <div class="stat"><div class="stat-label">EN YÜKSEK</div><div class="stat-value" id="highScoreDisplay">0</div></div>
      <div class="stat"><div class="stat-label">LEVEL</div><div class="stat-value level" id="levelDisplay">1</div></div>
      <div class="stat"><div class="stat-label">CAN</div><div class="stat-value hp" id="hpDisplay">♥♥♥</div></div>
    </div>
    <canvas id="gameCanvas" width="600" height="340"></canvas>
    <div class="controls-hint"><span>SPACE / ↑</span> Zıpla &nbsp;|&nbsp; <span>→ ←</span> Hareket &nbsp;|&nbsp; Mobil: Ekrana dokun</div>
  </div>
</div>

<!-- ADMIN LOGIN MODAL -->
<div id="adminModal" class="admin-modal-overlay">
  <div class="admin-modal-box">
    <div class="admin-modal-title">YÖNETİCİSİ<br>GİRİŞ ARAYÜZÜ</div>
    <label class="admin-modal-label">E-POSTA</label>
    <input id="adminEmailInput" class="admin-modal-input" type="email" placeholder="admin@gmail.com">
    <label class="admin-modal-label">ŞİFRE</label>
    <input id="adminPassInput" class="admin-modal-input" type="password" placeholder="••••••••">
    <div class="admin-modal-btns">
      <button class="admin-modal-submit" onclick="checkAdminLogin()">Giriş</button>
      <button class="admin-modal-cancel" onclick="closeAdminModal()">İptal</button>
    </div>
    <div id="adminModalError" class="admin-modal-error">Hatalı email veya şifre!</div>
  </div>
</div>

<!-- ADMIN SCREEN -->
<div id="adminScreen" class="screen">
  <div class="admin-header">
    <span style="font-size:20px">👑</span>
    <div class="admin-title">ADMİN PANELİ</div>
    <button class="admin-back" onclick="backToGame()">← Oyuna Dön</button>
  </div>
  <div class="admin-content">
    <div class="admin-stats-grid">
      <div class="admin-stat-card"><div class="num" id="totalUsers">—</div><div class="lbl">Toplam Oyuncu</div></div>
      <div class="admin-stat-card"><div class="num" id="totalSessions">—</div><div class="lbl">Toplam Oturum</div></div>
      <div class="admin-stat-card"><div class="num" id="topScore">—</div><div class="lbl">En Yüksek Puan</div></div>
    </div>
    <h2 style="font-family:var(--pixel);font-size:11px;color:#ffaa00;margin-bottom:16px;">TÜM OYUNCULAR</h2>
    <div id="usersTableWrapper"><div class="loading-spinner"><div class="spinner"></div> Yükleniyor...</div></div>
  </div>
</div>

<div class="save-toast" id="saveToast">💾 KAYDEDİLDİ</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut }
  from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection, getDocs, updateDoc, serverTimestamp, increment, Timestamp }
  from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkBqow7ji5V167TeXwOvyAMcB5ONUMiq8",
  authDomain: "pixelrun-oyun.firebaseapp.com",
  projectId: "pixelrun-oyun",
  storageBucket: "pixelrun-oyun.firebasestorage.app",
  messagingSenderId: "474490397841",
  appId: "1:474490397841:web:a4ff07afce609368ce0b30",
  measurementId: "G-84MKEZ9FSW"
};

const ADMIN_EMAIL = "aksoyturgut23@gmail.com";
const ADMIN_PASS  = "blazer2342";

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
let currentUser = null;

// ── Auth ──
onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    window._currentEmail = user.email;
    // Ban kontrolu
    const banRef = doc(db, "bans", user.uid);
    const banSnap = await getDoc(banRef);
    if (banSnap.exists()) {
      const ban = banSnap.data();
      const now = Date.now();
      if (ban.until && ban.until.toMillis() > now) {
        const kalan = Math.ceil((ban.until.toMillis() - now) / 60000);
        await fbSignOut(auth);
        showScreen('loginScreen');
        document.getElementById('loginErrorMsg').textContent =
          '⛔ ' + kalan + ' dakika boyunca banlısınız.';
        document.getElementById('loginErrorMsg').style.display = 'block';
        return;
      } else {
        // Ban suresi dolmus, temizle
        await deleteDoc(banRef);
      }
    }
    await ensureUserDoc(user);
    await loadProgress();
    showGameScreen(user);
  } else {
    currentUser = null;
    window._currentEmail = null;
    showScreen('loginScreen');
  }
});

async function ensureUserDoc(user) {
  const ref  = doc(db, "users", user.uid);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      uid: user.uid, email: user.email,
      displayName: user.displayName, photoURL: user.photoURL,
      firstLogin: serverTimestamp(), lastSeen: serverTimestamp(),
      highScore: 0, level: 1, totalSessions: 1
    });
  } else {
    await updateDoc(ref, {
      lastSeen: serverTimestamp(), totalSessions: increment(1),
      displayName: user.displayName, photoURL: user.photoURL
    });
  }
}

async function loadProgress() {
  const snap = await getDoc(doc(db, "users", currentUser.uid));
  if (snap.exists()) {
    const d = snap.data();
    gameState.highScore = d.highScore || 0;
    gameState.level     = d.level     || 1;
    updateHUD();
  }
}

async function saveProgress() {
  if (!currentUser) return;
  await updateDoc(doc(db, "users", currentUser.uid), {
    highScore: gameState.highScore, level: gameState.level, lastSeen: serverTimestamp()
  });
  const t = document.getElementById('saveToast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Sign in — her zaman popup (en evrensel yontem) ──
window.signInWithGoogle = async function() {
  const provider = new GoogleAuthProvider();
  provider.addScope('email');
  provider.addScope('profile');
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    if (e.code !== 'auth/popup-closed-by-user') {
      alert("Giriş başarısız: " + e.code);
    }
  }
};

window.doSignOut = async function() {
  stopGame();
  await fbSignOut(auth);
};

function showGameScreen(user) {
  document.getElementById('headerAvatar').src = user.photoURL || '';
  document.getElementById('headerName').textContent = user.displayName || user.email;
  const adminBtn = document.getElementById('adminDirectBtn');
  if (user.email && user.email.trim().toLowerCase() === ADMIN_EMAIL.trim().toLowerCase()) {
    adminBtn.style.display = 'inline-flex';
  } else {
    adminBtn.style.display = 'none';
  }
  showScreen('gameScreen');
  startGame();
}

// ── Admin direkt giris ──
window.openAdminDirect = async function() {
  stopGame();
  showScreen('adminScreen');
  await loadAdminData();
};

// ── Admin modal ──
window.openAdminModal = function() {
  document.getElementById('adminEmailInput').value = '';
  document.getElementById('adminPassInput').value  = '';
  document.getElementById('adminModalError').style.display = 'none';
  document.getElementById('adminModal').classList.add('open');
};

window.closeAdminModal = function() {
  document.getElementById('adminModal').classList.remove('open');
};

window.checkAdminLogin = async function() {
  const email = document.getElementById('adminEmailInput').value.trim().toLowerCase();
  const pass  = document.getElementById('adminPassInput').value;
  if (email === ADMIN_EMAIL.toLowerCase() && pass === ADMIN_PASS) {
    closeAdminModal();
    stopGame();
    showScreen('adminScreen');
    await loadAdminData();
  } else {
    document.getElementById('adminModalError').style.display = 'block';
  }
};

window.backToGame = function() {
  showScreen('gameScreen');
  startGame();
};

// ── Ban sistemi ──
let banTargetUid = null;

window.openBanModal = function(uid, name) {
  banTargetUid = uid;
  document.getElementById('banTargetName').textContent = name;
  document.getElementById('banMinutesInput').value = '30';
  document.getElementById('banModal').style.display = 'flex';
};

window.closeBanModal = function() {
  document.getElementById('banModal').style.display = 'none';
  banTargetUid = null;
};

window.applyBan = async function() {
  if (!banTargetUid) return;
  const mins = parseInt(document.getElementById('banMinutesInput').value) || 30;
  const until = new Date(Date.now() + mins * 60 * 1000);
  await setDoc(doc(db, "bans", banTargetUid), {
    until: Timestamp.fromDate(until),
    minutes: mins,
    bannedAt: serverTimestamp()
  });
  document.getElementById('banModal').style.display = 'none';
  banTargetUid = null;
  alert('✅ Kullanıcı ' + mins + ' dakika banlandı.');
};

async function loadAdminData() {
  const wrapper = document.getElementById('usersTableWrapper');
  wrapper.innerHTML = '<div class="loading-spinner"><div class="spinner"></div> Yükleniyor...</div>';
  const snap  = await getDocs(collection(db, "users"));
  const users = [];
  snap.forEach(d => users.push(d.data()));

  document.getElementById('totalUsers').textContent    = users.length;
  document.getElementById('totalSessions').textContent = users.reduce((s,u) => s+(u.totalSessions||0), 0);
  document.getElementById('topScore').textContent      = users.length ? Math.max(...users.map(u => u.highScore||0)) : 0;

  users.sort((a,b) => (b.highScore||0)-(a.highScore||0));
  const rows = users.map(u => {
    const last  = u.lastSeen   ? new Date(u.lastSeen.seconds*1000).toLocaleString('tr-TR')   : '—';
    const first = u.firstLogin ? new Date(u.firstLogin.seconds*1000).toLocaleDateString('tr-TR') : '—';
    const isAdmin = u.email === ADMIN_EMAIL;
    const banBtn = isAdmin ? '' :
      `<button onclick="openBanModal('${u.uid}','${(u.displayName||u.email).replace(/'/g,'')}')"
        style="padding:4px 10px;background:transparent;border:1px solid #ff3366;color:#ff3366;font-size:11px;cursor:pointer;border-radius:2px;">
        ⛔ Ban
      </button>`;
    return `<tr>
      <td>${u.photoURL ? `<img src="${u.photoURL}" class="user-row-avatar" onerror="this.style.display='none'">` : ''}${u.displayName||'—'}</td>
      <td style="color:var(--muted)">${u.email}</td>
      <td><span class="badge badge-level">Lvl ${u.level||1}</span></td>
      <td style="font-family:var(--pixel);font-size:11px;color:var(--accent)">${u.highScore||0}</td>
      <td style="color:var(--muted);font-size:12px">${u.totalSessions||1}x</td>
      <td style="color:var(--muted);font-size:11px">${first}</td>
      <td style="color:var(--muted);font-size:11px">${last}</td>
      <td>${banBtn}</td>
    </tr>`;
  }).join('');
  wrapper.innerHTML = `<table class="users-table"><thead><tr>
    <th>İSİM</th><th>E-POSTA</th><th>LEVEL</th><th>EN YÜKSEK</th><th>OTURUM</th><th>İLK GİRİŞ</th><th>SON AKTİVİTE</th>
  <th>İŞLEM</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── OYUN MOTORU ──
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const gameState = { score:0, highScore:0, level:1, hp:3, running:false, animFrame:null };
const player    = { x:80, y:0, w:28, h:28, vy:0, vx:0, onGround:false, frame:0, frameTimer:0 };

const GROUND_Y   = H - 60;
const GRAVITY    = 0.55;
const JUMP_FORCE = -12;
const MOVE_SPEED = 4;

let obstacles=[], coins=[], particles=[], bgStars=[];
let spawnTimer=0, coinTimer=0, distanceTraveled=0, worldSpeed=3;

for (let i=0;i<60;i++) bgStars.push({x:Math.random()*W,y:Math.random()*(H-80),r:Math.random()*1.5+0.3,speed:Math.random()*0.5+0.2});

const keys = {};
document.addEventListener('keydown', e => { keys[e.code]=true; });
document.addEventListener('keyup',   e => { keys[e.code]=false; });
canvas.addEventListener('touchstart', e => { e.preventDefault(); keys['Space']=true; }, {passive:false});
canvas.addEventListener('touchend',   () => { keys['Space']=false; });

function resetGame() {
  player.x=80; player.y=GROUND_Y-player.h; player.vy=0; player.vx=0; player.onGround=false;
  obstacles=[]; coins=[]; particles=[];
  spawnTimer=0; coinTimer=0; distanceTraveled=0;
  worldSpeed = 3 + (gameState.level-1)*0.5;
  gameState.score=0; gameState.hp=3;
  updateHUD();
}

function startGame() {
  if (gameState.running) return;
  gameState.running=true; resetGame(); loop();
}

function stopGame() {
  gameState.running=false;
  if (gameState.animFrame) cancelAnimationFrame(gameState.animFrame);
}

function loop() {
  if (!gameState.running) return;
  update(); draw();
  gameState.animFrame = requestAnimationFrame(loop);
}

function update() {
  player.vx=0;
  if (keys['ArrowRight']||keys['KeyD']) player.vx=MOVE_SPEED;
  if (keys['ArrowLeft'] ||keys['KeyA']) player.vx=-MOVE_SPEED;
  if ((keys['Space']||keys['ArrowUp']||keys['KeyW']) && player.onGround) {
    player.vy=JUMP_FORCE; player.onGround=false;
    spawnParticles(player.x+player.w/2, player.y+player.h, '#00ff88', 6);
  }
  player.vy += GRAVITY; player.x += player.vx; player.y += player.vy;
  if (player.y >= GROUND_Y-player.h) { player.y=GROUND_Y-player.h; player.vy=0; player.onGround=true; }
  player.x = Math.max(0, Math.min(W-player.w, player.x));
  player.frameTimer++; if (player.frameTimer>8) { player.frame=(player.frame+1)%4; player.frameTimer=0; }
  worldSpeed = 3 + gameState.score*0.001 + (gameState.level-1)*0.5;
  bgStars.forEach(s => { s.x -= s.speed*(worldSpeed/3); if(s.x<0){s.x=W;s.y=Math.random()*(H-80);} });

  spawnTimer++;
  if (spawnTimer > Math.max(50, 100-gameState.score*0.05)) {
    spawnTimer=0; const h=20+Math.random()*40;
    obstacles.push({x:W, y:GROUND_Y-h, w:18+Math.random()*12, h, color:'#ff3366'});
  }
  coinTimer++;
  if (coinTimer>60) {
    coinTimer=0;
    if (Math.random()>0.3) {
      const rows=[GROUND_Y-40,GROUND_Y-80,GROUND_Y-120];
      coins.push({x:W, y:rows[Math.floor(Math.random()*rows.length)], r:8, collected:false});
    }
  }
  for (let i=obstacles.length-1;i>=0;i--) {
    obstacles[i].x -= worldSpeed;
    if (obstacles[i].x+obstacles[i].w<0) { obstacles.splice(i,1); continue; }
    if (rectsOverlap(player,obstacles[i])) {
      obstacles.splice(i,1); gameState.hp--;
      spawnParticles(player.x+player.w/2, player.y+player.h/2, '#ff3366', 12);
      if (gameState.hp<=0) { gameOver(); return; }
      updateHUD();
    }
  }
  for (let i=coins.length-1;i>=0;i--) {
    coins[i].x -= worldSpeed;
    if (coins[i].x<-20) { coins.splice(i,1); continue; }
    const {x:cx,y:cy,r:cr} = coins[i];
    if (!coins[i].collected && player.x<cx+cr && player.x+player.w>cx-cr && player.y<cy+cr && player.y+player.h>cy-cr) {
      coins.splice(i,1); gameState.score+=10;
      spawnParticles(cx,cy,'#ffdd00',8); updateHUD();
    }
  }
  distanceTraveled += worldSpeed;
  if (distanceTraveled>100) { distanceTraveled=0; gameState.score++; updateHUD(); }
  const newLevel = Math.floor(gameState.score/100)+1;
  if (newLevel>gameState.level) { gameState.level=newLevel; updateHUD(); saveProgress(); }
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life-=2;
    if(p.life<=0) particles.splice(i,1);
  }
}

function rectsOverlap(a,b) { return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }
function spawnParticles(x,y,color,count) {
  for(let i=0;i<count;i++) particles.push({x,y,color,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4-2,life:60+Math.random()*40,r:2+Math.random()*3});
}

function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,W,H);
  bgStars.forEach(s => { ctx.fillStyle=`rgba(200,200,255,${0.3+s.speed*0.3})`; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); });
  ctx.fillStyle='#1a1a2e'; ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);
  ctx.fillStyle='#00ff88'; ctx.fillRect(0,GROUND_Y,W,2);
  ctx.fillStyle='rgba(0,255,136,0.1)';
  for(let gx=0;gx<W;gx+=40) ctx.fillRect(gx,GROUND_Y+2,20,H-GROUND_Y-2);
  obstacles.forEach(o => {
    ctx.fillStyle=o.color; ctx.fillRect(o.x,o.y,o.w,o.h);
    ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(o.x,o.y,o.w,3); ctx.fillRect(o.x,o.y,3,o.h);
  });
  coins.forEach(c => {
    const pulse=Math.sin(Date.now()*0.005)*1;
    ctx.fillStyle='#ffdd00'; ctx.shadowColor='#ffdd00'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(c.x,c.y,c.r+pulse,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.fillStyle='#fff8c0'; ctx.beginPath(); ctx.arc(c.x-2,c.y-2,3,0,Math.PI*2); ctx.fill();
  });
  drawPlayer();
  particles.forEach(p => {
    ctx.globalAlpha=p.life/100; ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=4;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  });
  ctx.globalAlpha=1;
}

function drawPlayer() {
  const {x:px,y:py,w:pw,h:ph} = player;
  ctx.fillStyle='rgba(0,255,136,0.15)'; ctx.beginPath(); ctx.ellipse(px+pw/2,GROUND_Y+2,pw/2,4,0,0,Math.PI*2); ctx.fill();
  ctx.shadowColor='#00ff88'; ctx.shadowBlur=12;
  ctx.fillStyle='#00ff88'; ctx.fillRect(px+4,py+6,pw-8,ph-6);
  ctx.fillRect(px+2,py,pw-4,12);
  ctx.fillStyle='#0a0a0f'; ctx.fillRect(px+7,py+3,4,4); ctx.fillRect(px+pw-11,py+3,4,4);
  ctx.fillStyle='#ffffff'; ctx.fillRect(px+8,py+4,2,2); ctx.fillRect(px+pw-10,py+4,2,2);
  const legOff = player.onGround ? Math.sin(player.frameTimer*0.5)*3 : 0;
  ctx.fillStyle='#00cc66'; ctx.fillRect(px+5,py+ph-8+legOff,7,8); ctx.fillRect(px+pw-12,py+ph-8-legOff,7,8);
  ctx.shadowBlur=0;
}

function gameOver() {
  gameState.running=false;
  if (gameState.score>gameState.highScore) { gameState.highScore=gameState.score; saveProgress(); }
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
  ctx.font="bold 22px 'Press Start 2P'"; ctx.fillStyle='#ff3366'; ctx.textAlign='center';
  ctx.shadowColor='#ff3366'; ctx.shadowBlur=20; ctx.fillText('GAME OVER',W/2,H/2-40); ctx.shadowBlur=0;
  ctx.font="12px 'Press Start 2P'"; ctx.fillStyle='#00ff88'; ctx.fillText('PUAN: '+gameState.score,W/2,H/2);
  ctx.font="10px 'Press Start 2P'"; ctx.fillStyle='#555570'; ctx.fillText('SPACE ile yeniden başla',W/2,H/2+40);
  ctx.textAlign='left';
  const restart = e => {
    if (e.code==='Space'||e.type==='touchstart') {
      document.removeEventListener('keydown',restart); canvas.removeEventListener('touchstart',restart);
      gameState.running=true; resetGame(); loop();
    }
  };
  document.addEventListener('keydown',restart); canvas.addEventListener('touchstart',restart);
}

function updateHUD() {
  document.getElementById('scoreDisplay').textContent    = gameState.score;
  document.getElementById('highScoreDisplay').textContent= gameState.highScore;
  document.getElementById('levelDisplay').textContent    = gameState.level;
  const hearts=['','♥','♥♥','♥♥♥'];
  document.getElementById('hpDisplay').textContent = hearts[Math.max(0,gameState.hp)]||'';
}
</script>

<!-- BAN MODAL -->
<div id="banModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9500;align-items:center;justify-content:center;">
  <div style="background:#12121a;border:1px solid #ff3366;border-top:3px solid #ff3366;padding:32px;max-width:340px;width:90%;border-radius:2px;box-shadow:0 0 40px rgba(255,51,102,0.2);">
    <h2 style="font-family:'Press Start 2P',monospace;font-size:10px;color:#ff3366;margin-bottom:20px;text-align:center;line-height:1.8;">⛔ KULLANICI BANLA</h2>
    <p style="font-size:13px;color:#e0e0f0;margin-bottom:16px;text-align:center;">
      <span id="banTargetName" style="color:#ff3366;font-weight:600;"></span>
    </p>
    <label style="font-size:11px;color:#555570;display:block;margin-bottom:6px;">BAN SÜRESİ (DAKİKA)</label>
    <input id="banMinutesInput" type="number" min="1" max="99999" value="30"
      style="width:100%;padding:10px 12px;background:#0a0a0f;border:1px solid #333355;color:#e0e0f0;font-family:'Outfit',sans-serif;font-size:16px;border-radius:2px;outline:none;margin-bottom:20px;">
    <div style="display:flex;gap:10px;">
      <button onclick="applyBan()" style="flex:1;padding:12px;background:transparent;border:1px solid #ff3366;color:#ff3366;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border-radius:2px;">⛔ Banla</button>
      <button onclick="closeBanModal()" style="padding:12px 16px;background:transparent;border:1px solid #333355;color:#555570;font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;border-radius:2px;">İptal</button>
    </div>
  </div>
</div>
